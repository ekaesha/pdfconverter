services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  grobid:
    image: lfoppiano/grobid:0.8.1
    ports:
      - "8070:8070"
    environment:
      - JAVA_OPTS=-Xmx4g

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    environment:
      - PDF_REDIS_URL=redis://redis:6379/0
      - PDF_GROBID_URL=http://grobid:8070
    depends_on:
      - redis
      - grobid

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./storage:/app/storage
    environment:
      - PDF_REDIS_URL=redis://redis:6379/0
      - PDF_GROBID_URL=http://grobid:8070
    depends_on:
      - redis
      - grobid
